# Book-level configuration — Logic Gates to Attack Graphs
# fischer³ Education

title: "Logic Gates to Attack Graphs"
author: "Robert Fischer, fischer³ Education"
logo: assets/logo.png   # add logo here when available

# Colab launch buttons
launch_buttons:
  colab_url: "https://colab.research.google.com"

# Repository info for edit/launch buttons
repository:
  url: https://github.com/fischer3-net/jupyter-gates-to-graphs
  path_to_book: ""
  branch: main

# HTML output
html:
  use_repository_button: true
  use_issues_button: true
  use_edit_page_button: false
  home_page_in_navbar: true
  favicon: ""

# Execution — notebooks are not auto-executed at build time;
# students run them interactively via Colab
execute:
  execute_notebooks: "off"

# Sphinx extensions
sphinx:
  extra_extensions: []
  config:
    copyright: "2026 fischer³ Education (fischer³.net)"
    mathjax_path: https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
